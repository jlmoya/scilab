<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="atoms_browser.css">
    <title>ATOMS</title>
</head>
<body>
    <div id="loading">
        <div class="spinner"></div>
    </div>
    <div id="app">
        <!-- Header -->
        <header id="header">
            <div class="header-left">
                <svg class="header-icon" viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="3"/>
                    <ellipse cx="12" cy="12" rx="10" ry="4"/>
                    <ellipse cx="12" cy="12" rx="10" ry="4" transform="rotate(60 12 12)"/>
                    <ellipse cx="12" cy="12" rx="10" ry="4" transform="rotate(120 12 12)"/>
                </svg>
                <h1 id="title">ATOMS</h1>
            </div>
            <div class="header-right">
                <div class="header-tabs">
                    <button class="tab-btn active" id="tab-browse" onclick="switchTab('browse')">Browse</button>
                    <button class="tab-btn" id="tab-installed" onclick="switchTab('installed')">Installed</button>
                </div>
                <div class="search-box">
                    <svg class="search-icon" viewBox="0 0 24 24" width="16" height="16">
                        <circle cx="11" cy="11" r="7" fill="none" stroke="currentColor" stroke-width="2"/>
                        <line x1="16.5" y1="16.5" x2="21" y2="21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                    <input type="text" id="search" placeholder="Search modules..." autocomplete="off">
                    <kbd id="search-clear" title="Clear search">Esc</kbd>
                </div>
                <button id="header-refresh" class="header-icon-btn" title="Refresh package list" onclick="doSystemUpdate()">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="23 4 23 10 17 10"/>
                        <polyline points="1 20 1 14 7 14"/>
                        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
                    </svg>
                </button>
            </div>
        </header>

        <!-- Status bar -->
        <div id="statusbar" class="statusbar hidden"></div>

        <!-- Browse layout: sidebar + content -->
        <div id="browse-layout">
            <aside id="sidebar">
                <!-- Category tree filled dynamically -->
            </aside>
            <div id="browse-main">
                <!-- Breadcrumb -->
                <nav id="breadcrumb">
                    <a class="crumb" onclick="navigateTo([])">Home</a>
                </nav>
                <!-- Content area -->
                <main id="content">
                    <!-- Filled dynamically -->
                </main>
            </div>
        </div>
    </div>
    <script src="atoms_browser.js"></script>
</body>
</html>
