<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="demo_browser.css">
    <title>Scilab Demonstrations</title>
</head>
<body>
    <div id="app">
        <!-- Header -->
        <header id="header">
            <div class="header-left">
                <svg class="header-icon" viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="2" y="3" width="20" height="14" rx="2"/>
                    <path d="M8 21h8"/>
                    <path d="M12 17v4"/>
                    <polygon points="10,7 10,13 15,10" fill="white" stroke="none"/>
                </svg>
                <h1 id="title">Demonstrations</h1>
            </div>
            <div class="header-right">
                <div class="search-box">
                    <svg class="search-icon" viewBox="0 0 24 24" width="16" height="16">
                        <circle cx="11" cy="11" r="7" fill="none" stroke="currentColor" stroke-width="2"/>
                        <line x1="16.5" y1="16.5" x2="21" y2="21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                    <input type="text" id="search" placeholder="Search demos..." autocomplete="off">
                    <kbd id="search-clear" title="Clear search">Esc</kbd>
                </div>
            </div>
        </header>

        <!-- Breadcrumb -->
        <nav id="breadcrumb">
            <a href="#" class="crumb" data-level="-1">Home</a>
        </nav>

        <!-- Content area -->
        <main id="content">
            <!-- Filled dynamically -->
        </main>
    </div>
    <script src="demo_browser.js"></script>
</body>
</html>
