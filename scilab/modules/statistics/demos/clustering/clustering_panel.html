<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
<link href="clustering_panel.css" rel="stylesheet">
</head>
<body>
    <h3>Dataset</h3>
    <div class="card">
        <div class="row">
            <label>Total points (N)</label>
            <span class="val" id="n-val">170</span>
        </div>
        <input type="range" id="n-pts" min="50" max="250" step="10" value="170">
        <div class="bounds">
            <span>50</span>
            <span>250</span>
        </div>
    </div>

    <h3>DBSCAN</h3>

    <div class="card">
        <div class="row">
            <label>eps</label>
            <span class="val" id="eps-val">0.50</span>
        </div>
        <input type="range" id="eps" min="0.1" max="2.0" step="0.05" value="0.5">
        <div class="bounds">
            <span>0.1</span>
            <span>2.0</span>
        </div>
    </div>

    <div class="card">
        <div class="row">
            <label>minPts</label>
            <span class="val" id="minpts-val">5</span>
        </div>
        <input type="range" id="minpts" min="2" max="20" step="1" value="5">
        <div class="bounds">
            <span>2</span>
            <span>20</span>
        </div>
    </div>

    <div class="card">
        <label style="display: block; margin-bottom: 6px;">Distance metric</label>
        <select id="metric">
            <option value="euclidean">Euclidean (L2)</option>
            <option value="cityblock">Manhattan (L1)</option>
            <option value="chebychev">Chebyshev (L&#8734;)</option>
        </select>
    </div>

    <h3>Mean Shift</h3>

    <div class="card">
        <div class="row">
            <label>Bandwidth</label>
            <span class="val" id="bw-val">1.30</span>
        </div>
        <input type="range" id="bandwidth" min="0.1" max="2.0" step="0.05" value="1.3">
        <div class="bounds">
            <span>0.1</span>
            <span>2.0</span>
        </div>
    </div>

    <h3>K-Means</h3>

    <div class="card">
        <div class="row">
            <label>Clusters (k)</label>
            <span class="val" id="k-val">3</span>
        </div>
        <input type="range" id="k" min="1" max="10" step="1" value="3">
        <div class="bounds">
            <span>1</span>
            <span>10</span>
        </div>
    </div>

    <div id="spinner">Computing&#8230;</div>

    
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="clustering_panel.js"></script>
</body>
</html>
