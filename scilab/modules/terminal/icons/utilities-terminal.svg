<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <!-- window body -->
  <rect x="20" y="36" width="216" height="184" rx="18" ry="18" fill="#2e3436" stroke="#11171a" stroke-width="4"/>
  <!-- title bar (rounded only at the top) -->
  <path d="M20 56 a18 18 0 0 1 18 -18 h180 a18 18 0 0 1 18 18 v20 h-216 z" fill="#586e75"/>
  <!-- traffic lights -->
  <circle cx="46" cy="58" r="7" fill="#ef2929"/>
  <circle cx="70" cy="58" r="7" fill="#fce94f"/>
  <circle cx="94" cy="58" r="7" fill="#8ae234"/>
  <!-- prompt chevron ">" -->
  <path d="M54 112 l42 30 l-42 30" fill="none" stroke="#8ae234" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- cursor underscore -->
  <rect x="110" y="160" width="64" height="15" rx="6" fill="#eeeeec"/>
</svg>
